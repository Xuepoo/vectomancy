name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: vectomancy-linux-x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact_name: vectomancy-linux-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: vectomancy-windows-x86_64.exe
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact_name: vectomancy-windows-aarch64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: vectomancy-macos-x86_64
          - os: macos-14
            target: aarch64-apple-darwin
            artifact_name: vectomancy-macos-aarch64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }} --manifest-path Cargo.toml

      - name: Rename artifact (Linux/macOS)
        if: runner.os != 'Windows'
        run: mv target/${{ matrix.target }}/release/vectomancy ${{ matrix.artifact_name }}

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        run: move target/${{ matrix.target }}/release/vectomancy.exe ${{ matrix.artifact_name }}

      - name: Package for Linux distributions
        if: runner.os == 'Linux'
        run: |
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            NFPM_ARCH="arm64"
            PKG_ARCH="aarch64"
          else
            NFPM_ARCH="x86_64"
            PKG_ARCH="x86_64"
          fi
          curl -sL https://github.com/goreleaser/nfpm/releases/download/v2.37.1/nfpm_2.37.1_Linux_${NFPM_ARCH}.tar.gz | tar xz nfpm
          sed -i "s/amd64/${NFPM_ARCH}/g" nfpm.yaml
          sed -i "s/vectomancy-linux-x86_64/${{ matrix.artifact_name }}/g" nfpm.yaml
          ./nfpm pkg --packager deb --target vectomancy-linux-${PKG_ARCH}.deb
          ./nfpm pkg --packager rpm --target vectomancy-linux-${PKG_ARCH}.rpm
          ./nfpm pkg --packager archlinux --target vectomancy-linux-${PKG_ARCH}.pkg.tar.zst

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_name }}
            *.deb
            *.rpm
            *.pkg.tar.zst

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: vectomancy-linux-x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact_name: vectomancy-linux-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: vectomancy-windows-x86_64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: vectomancy-macos-x86_64
          - os: macos-14
            target: aarch64-apple-darwin
            artifact_name: vectomancy-macos-aarch64

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }} --manifest-path Cargo.toml

      - name: Rename artifact (Linux/macOS)
        if: runner.os != 'Windows'
        run: mv target/${{ matrix.target }}/release/vectomancy ${{ matrix.artifact_name }}

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        run: move target/${{ matrix.target }}/release/vectomancy.exe ${{ matrix.artifact_name }}

      - name: Package for Linux distributions
        if: runner.os == 'Linux'
        run: |
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            NFPM_ARCH="arm64"
            PKG_ARCH="aarch64"
          else
            NFPM_ARCH="x86_64"
            PKG_ARCH="x86_64"
          fi
          curl -sL https://github.com/goreleaser/nfpm/releases/download/v2.37.1/nfpm_2.37.1_Linux_${NFPM_ARCH}.tar.gz | tar xz nfpm
          sed -i "s/amd64/${NFPM_ARCH}/g" nfpm.yaml
          sed -i "s/vectomancy-linux-x86_64/${{ matrix.artifact_name }}/g" nfpm.yaml
          ./nfpm pkg --packager deb --target vectomancy-linux-${PKG_ARCH}.deb
          ./nfpm pkg --packager rpm --target vectomancy-linux-${PKG_ARCH}.rpm
          ./nfpm pkg --packager archlinux --target vectomancy-linux-${PKG_ARCH}.pkg.tar.zst

      - name: Upload artifact
        uses: actions/upload-artifact@v4.4.0
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_name }}
            *.deb
            *.rpm
            *.pkg.tar.zst

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/**/*
          generate_release_notes: true

  publish-crates:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        # Pinning stable rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CRATES_TOKEN }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_TOKEN }}

  publish-aur:
    name: Publish to AUR
    needs: release
    runs-on: ubuntu-latest
    container: archlinux:latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Install Arch build dependencies
        run: |
          pacman -Syu --noconfirm git openssh pacman-contrib sudo fakeroot binutils make gcc pkgconf

      - name: Configure SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 aur.archlinux.org >> ~/.ssh/known_hosts

          # Sync to /root/.ssh for standard ssh client compatibility in containers
          mkdir -p /root/.ssh
          cp -r ~/.ssh/* /root/.ssh/
          chmod 700 /root/.ssh
          chmod 600 /root/.ssh/*

      - name: Configure Git
        run: |
          git config --system --add safe.directory '*'
          git config --global user.name "Xuepoo (CI)"
          git config --global user.email "xuepoofoter@gmail.com"

      - name: Update AUR source package (vectomancy)
        run: |
          git clone ssh://aur@aur.archlinux.org/vectomancy.git aur-src
          cd aur-src
          CLEAN_VERSION=${{ github.ref_name }}
          CLEAN_VERSION=${CLEAN_VERSION#v}
          sed -i "s/^pkgver=.*/pkgver=${CLEAN_VERSION}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          useradd -m builder && echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R builder:builder .
          su builder -c "updpkgsums && makepkg --printsrcinfo > .SRCINFO"
          git add PKGBUILD .SRCINFO
          git commit -m "Update to v${CLEAN_VERSION}" || true
          git push origin master

      - name: Update AUR binary package (vectomancy-bin)
        run: |
          git clone ssh://aur@aur.archlinux.org/vectomancy-bin.git aur-bin
          cd aur-bin
          CLEAN_VERSION=${{ github.ref_name }}
          CLEAN_VERSION=${CLEAN_VERSION#v}
          sed -i "s/^pkgver=.*/pkgver=${CLEAN_VERSION}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          useradd -m builder && echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R builder:builder .
          su builder -c "updpkgsums && makepkg --printsrcinfo > .SRCINFO"
          git add PKGBUILD .SRCINFO
          git commit -m "Update to v${CLEAN_VERSION}" || true
          git push origin master

  publish-homebrew:
    name: Publish to Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Calculate SHA256
        id: sha
        run: |
          VERSION="${{ github.ref_name }}"
          CLEAN_VERSION=${VERSION#v}
          echo "version=${CLEAN_VERSION}" >> "$GITHUB_OUTPUT"

          sleep 15

          SHA_LINUX=$(sha256sum artifacts/vectomancy-linux-x86_64/vectomancy-linux-x86_64 | awk '{print $1}')
          SHA_MACOS_X86=$(sha256sum artifacts/vectomancy-macos-x86_64/vectomancy-macos-x86_64 | awk '{print $1}')
          SHA_MACOS_ARM=$(sha256sum artifacts/vectomancy-macos-aarch64/vectomancy-macos-aarch64 | awk '{print $1}')

          echo "sha_linux=${SHA_LINUX}" >> "$GITHUB_OUTPUT"
          echo "sha_macos_x86=${SHA_MACOS_X86}" >> "$GITHUB_OUTPUT"
          echo "sha_macos_arm=${SHA_MACOS_ARM}" >> "$GITHUB_OUTPUT"

      - name: Update Formula
        run: |
          VERSION="${{ steps.sha.outputs.version }}"
          REPO_URL="https://x-access-token:${{ secrets.GH_PAT }}@github.com/Xuepoo/homebrew-tap.git"

          git clone "${REPO_URL}" tap
          cd tap
          mkdir -p Formula

          cat > Formula/vectomancy.rb << FORMULA
          class Vectomancy < Formula
            desc "Use curve equations to draw"
            homepage "https://github.com/Xuepoo/vectomancy"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/Xuepoo/vectomancy/releases/download/v${VERSION}/vectomancy-macos-aarch64"
                sha256 "${{ steps.sha.outputs.sha_macos_arm }}"
              else
                url "https://github.com/Xuepoo/vectomancy/releases/download/v${VERSION}/vectomancy-macos-x86_64"
                sha256 "${{ steps.sha.outputs.sha_macos_x86 }}"
              end
            end

            on_linux do
              url "https://github.com/Xuepoo/vectomancy/releases/download/v${VERSION}/vectomancy-linux-x86_64"
              sha256 "${{ steps.sha.outputs.sha_linux }}"
            end

            def install
              if OS.mac?
                if Hardware::CPU.arm?
                  bin.install "vectomancy-macos-aarch64" => "vectomancy"
                else
                  bin.install "vectomancy-macos-x86_64" => "vectomancy"
                end
              elsif OS.linux?
                bin.install "vectomancy-linux-x86_64" => "vectomancy"
              end
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/vectomancy --version")
            end
          end
          FORMULA

          git config user.name "Xuepoo (CI)"
          git config user.email "xuepoofoter@gmail.com"
          git add Formula/vectomancy.rb
          git commit -m "chore: update vectomancy to v${VERSION}" || true
          git push

  publish-scoop:
    name: Publish to Scoop Bucket
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Calculate SHA256 and Update
        run: |
          VERSION="${{ github.ref_name }}"
          CLEAN_VERSION=${VERSION#v}
          SHA_WIN=$(sha256sum artifacts/vectomancy-windows-x86_64/vectomancy-windows-x86_64.exe | awk '{print $1}')

          REPO_URL="https://x-access-token:${{ secrets.GH_PAT }}@github.com/Xuepoo/scoop-bucket.git"
          git clone "${REPO_URL}" bucket-repo
          cd bucket-repo
          mkdir -p bucket

          cat > bucket/vectomancy.json << EOF
          {
            "version": "${CLEAN_VERSION}",
            "description": "Use curve equations to draw",
            "homepage": "https://github.com/Xuepoo/vectomancy",
            "license": "MIT",
            "architecture": {
              "64bit": {
                "url": "https://github.com/Xuepoo/vectomancy/releases/download/v${CLEAN_VERSION}/vectomancy-windows-x86_64.exe",
                "hash": "${SHA_WIN}",
                "bin": [["vectomancy-windows-x86_64.exe", "vectomancy"]]
              }
            },
            "checkver": {
              "github": "https://github.com/Xuepoo/vectomancy"
            },
            "autoupdate": {
              "architecture": {
                "64bit": {
                  "url": "https://github.com/Xuepoo/vectomancy/releases/download/v\$version/vectomancy-windows-x86_64.exe"
                }
              }
            }
          }
          EOF

          git config user.name "Xuepoo (CI)"
          git config user.email "xuepoofoter@gmail.com"
          git add bucket/vectomancy.json
          git commit -m "chore: update vectomancy to v${CLEAN_VERSION}" || true
          git push
